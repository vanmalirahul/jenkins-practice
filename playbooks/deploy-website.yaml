---
- name: Deploy custom website with Nginx
  hosts: webservers
  become: yes

  vars:
    site_title: "My First Ansible Website"
    welcome_message: "Hello from Jenkins + Ansible Pipeline!"

  tasks:
    - name: Install nginx
      dnf:
        name: nginx
        state: present

    - name: Install httpd
      dnf:
        name: httpd
        state: present  
    - name: Ensure nginx default web root exists
      file:
        path: /usr/share/nginx/html
        state: directory
        owner: nginx
        group: nginx
        mode: '0755'

    - name: Deploy custom index.html from template
      template:
        src: ../templates/index.html.j2
        dest: /usr/share/nginx/html/index.html
        owner: nginx
        group: nginx
        mode: '0644'
      notify: Restart nginx

    - name: Ensure nginx is running and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Allow HTTP through firewalld
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes

    - name: Ensure SELinux allows nginx to serve content
      sefcontext:
        target: '/usr/share/nginx/html(/.*)?'
        setype: httpd_sys_content_t
        state: present

    - name: Apply SELinux context
      command: restorecon -Rv /usr/share/nginx/html

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
