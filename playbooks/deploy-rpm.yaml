---
- name: Deploy custom RPM package - always latest
  hosts: webservers
  become: yes

  tasks:
    - name: Copy latest RPM to target server
      copy:
        src: "{{ playbook_dir }}/../myapp-latest.rpm"
        dest: /tmp/myapp.rpm
      register: copy_result

    - name: Check currently installed version
      command: rpm -q myapp
      register: current_version
      ignore_errors: yes
      changed_when: false

    - name: Show currently installed version
      debug:
        msg: "Currently installed: {{ current_version.stdout | default('Not installed') }}"

    - name: Install/Upgrade to latest RPM (only if file changed)
      command: dnf install -y /tmp/myapp.rpm
      register: dnf_output
      when: copy_result.changed
      changed_when: "'Nothing to do' not in dnf_output.stdout"

    - name: Verify installed version
      command: rpm -q myapp
      register: new_version
      changed_when: false

    - name: Show installed version
      debug:
        msg: "✅ Now installed: {{ new_version.stdout }}"

    - name: Run the installed application
      command: /usr/local/bin/myapp.sh
      register: app_output

    - name: Show application output
      debug:
        msg: "{{ app_output.stdout_lines }}"
