---
- name: Deploy custom RPM package
  hosts: webservers
  become: yes

  tasks:
    - name: Find the built RPM file locally
      ansible.builtin.find:
        paths: "{{ playbook_dir }}/.."
        patterns: "myapp-*.rpm"
      delegate_to: localhost
      register: rpm_file_search

    - name: Sort and pick the newest RPM
      ansible.builtin.set_fact:
        rpm_file: "{{ (rpm_file_search.files | sort(attribute='mtime', reverse=true))[0] }}"

    - name: Show RPM file found
      ansible.builtin.debug:
        msg: "Deploying: {{ rpm_file.path }}"

    - name: Copy RPM to target server
      ansible.builtin.copy:
        src: "{{ rpm_file.path }}"
        dest: /tmp/myapp.rpm

