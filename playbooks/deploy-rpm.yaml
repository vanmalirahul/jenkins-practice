---
- name: Deploy custom RPM package - remove old, install new
  hosts: webservers
  become: yes

  tasks:
    - name: Copy latest RPM to target server
      copy:
        src: "{{ playbook_dir }}/../myapp-latest.rpm"
        dest: /tmp/myapp.rpm
      register: copy_result

    - name: Check currently installed version
      command: rpm -q myapp
      register: current_version
      ignore_errors: yes
      changed_when: false

    - name: Show currently installed version
      debug:
        msg: "Currently installed: {{ current_version.stdout | default('Not installed') }}"

    - name: Remove existing myapp RPM if installed
      dnf:
        name: myapp
        state: absent
      when: current_version.rc == 0

    - name: Install fresh RPM from /tmp
      dnf:
        name: /tmp/myapp.rpm
        state: present
        disable_gpg_check: yes

    - name: Verify newly installed version
      command: rpm -q myapp
      register: new_version
      changed_when: false

    - name: Show newly installed version
      debug:
        msg: "✅ Now installed: {{ new_version.stdout }}"

    - name: Run the installed application
      command: /usr/local/bin/myapp.sh
      register: app_output

    - name: Show application output
      debug:
        msg: "{{ app_output.stdout_lines }}"
