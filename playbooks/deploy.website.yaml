---
- name: Deploy custom website with Nginx
  hosts: webservers
  become: yes

  vars:
    site_title: "My First Ansible Website"
    welcome_message: "Hello from Jenkins + Ansible Pipeline!"

  tasks:
    - name: Install nginx
      package:
        name: nginx
        state: present

    - name: Deploy custom index.html from template
      template:
        src: ../templates/index.html.j2
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'
      notify: Restart nginx

    - name: Ensure nginx is running
      service:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
